<!-- WestCoastGeothermal.com Page Layout -->
<tangible>
	<if field="image">
		<img src="{Field image_url}" class="w-100 object-fit-cover min-vh-25 min-vh-md-50 mb-n7 wcg-blog-single__hero-image" style="max-height: 420px; object-fit: cover;" alt="{Field image_alt}">
		<else>
			<img src="https://www.westcoastgeothermal.com/media/geothermal-vancouver-energy.jpg" class="w-100 min-vh-25 min-vh-md-50 mb-n7 wcg-blog-single__hero-image" style="max-height: 420px; object-fit: cover;">
		</else>
	</if>
	<div id="container-content-page" class="container wcg-blog-single mt-md-n6 position-relative mb-6">
		<article class="wcg-blog-single__surface">
			<div class="row text-center">
				<div class="col-12 mb-4 mb-md-5">
					<div class="lc-block">
						<h1 class="wcg-blog-single__title">
							<field name="title"></field>
						</h1>
					</div>
				</div>
			</div>
			<div class="row mb-0">
				<div class="col-12 col-lg-10 col-xl-8 mx-auto">
					<div class="lc-block wcg-blog-single__content">
						<field name="content"></field>
					</div>
					<div class="lc-block">
						[lc_edit_post_link text="Edit this page" class='d-inline-flex mt-4 mb-1 link-rule']
					</div>
				</div>
			</div>
		</article>
	</div>
</tangible>
